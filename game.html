<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6x6 快速打地鼠 | 程式魔術師</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&family=Noto+Sans+TC:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            user-select: none;
        }

        body, html { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }

        #game-wrapper {
            width: 100vw; height: 100vh;
            background: url('素材/bg.jpg') center center/cover;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* --- Grid Layout --- */
        #grid-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 10px;
            width: 85vmin;
            height: 85vmin;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 20px;
            border: 2px solid var(--glass);
        }

        .hole {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            transition: background 0.2s;
        }

        .hole:hover { background: rgba(255,255,255,0.1); }

        /* --- Characters --- */
        .character {
            position: absolute;
            inset: 2px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform: scale(0);
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            z-index: 10;
        }

        .character.active { transform: scale(1); }
        .character.hit { transform: scale(1.5); opacity: 0; pointer-events: none; }

        /* --- HUD --- */
        .hud {
            position: fixed; top: 20px;
            padding: 10px 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            color: white;
            font-size: 1.2rem;
            z-index: 100;
        }
        #score-board { left: 20px; }
        #timer-board { right: 20px; }

        /* --- Screens --- */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 200; color: white; text-align: center;
        }

        .btn {
            margin-top: 20px; padding: 12px 35px;
            background: var(--primary); color: white;
            border: none; border-radius: 50px; cursor: pointer;
            font-size: 1.2rem; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.1); }

        /* --- Particles --- */
        .particle {
            position: absolute; pointer-events: none;
            width: 8px; height: 8px; border-radius: 50%;
            animation: explode 0.5s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="score-board" class="hud">SCORE: <span id="score">0</span></div>
        <div id="timer-board" class="hud">TIME: <span id="timer">60</span>s</div>

        <div id="grid-container"></div>

        <div id="start-screen" class="overlay">
            <h1 style="font-size: 3rem; color: var(--accent);">6x6 快速打地鼠</h1>
            <p style="margin: 20px;">6x6 網格挑戰！點擊隨機閃現的角色！</p>
            <button class="btn" onclick="startGame()">開始挑戰</button>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid-container');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const startScreen = document.getElementById('start-screen');

        let score = 0;
        let timeLeft = 60;
        let gameActive = false;
        let holes = [];

        // Audio Objects (Empty paths by default, can be filled in)
        const bgm = new Audio(''); 
        bgm.loop = true;
        const hitSound = new Audio('素材/正向音效.mp3');
        const missSound = new Audio('素材/反派音效.mp3');

        // Initialize Grid
        for (let i = 0; i < 36; i++) {
            const hole = document.createElement('div');
            hole.className = 'hole';
            
            const char = document.createElement('div');
            char.className = 'character';
            
            hole.appendChild(char);
            grid.appendChild(hole);
            holes.push({ hole, char, active: false });

            char.addEventListener('mousedown', () => {
                if (char.classList.contains('active')) {
                    hitCharacter(i);
                }
            });
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            gameActive = true;
            scoreEl.innerText = score;
            timerEl.innerText = timeLeft;
            startScreen.style.display = 'none';

            // Play BGM if path is provided
            if (bgm.src && bgm.src !== window.location.href) {
                bgm.play().catch(e => console.log("Audio play failed: ", e));
            }

            gameLoop();
            const timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endGame();
                }
            }, 1000);
        }

        function gameLoop() {
            if (!gameActive) return;

            // Spawn multiple characters at once
            const spawnCount = Math.floor(Math.random() * 3) + 2; // 2 to 5 characters
            for (let i = 0; i < spawnCount; i++) {
                const index = Math.floor(Math.random() * 36);
                if (!holes[index].active) {
                    showCharacter(index);
                }
            }

            const delay = Math.max(400, 1000 - (60 - timeLeft) * 10);
            setTimeout(gameLoop, delay);
        }

        function showCharacter(index) {
            const h = holes[index];
            h.active = true;
            const isHero = Math.random() > 0.3; // 70% Hero, 30% Villain
            
            h.char.style.backgroundImage = `url('${isHero ? '素材/正.png' : '素材/反.jpg'}')`;
            h.points = isHero ? 10 : -20;
            h.char.classList.add('active');

            setTimeout(() => {
                if (h.active) {
                    h.char.classList.remove('active');
                    h.active = false;
                }
            }, 1000);
        }

        function hitCharacter(index) {
            const h = holes[index];
            score += h.points;
            scoreEl.innerText = score;
            h.active = false;
            h.char.classList.add('hit');
            h.char.classList.remove('active');

            createParticles(h.hole, h.points > 0 ? '#secondary' : '#primary');

            // Play sound effects
            if (h.points > 0) {
                if (hitSound.src) hitSound.cloneNode(true).play().catch(e => {});
            } else {
                if (missSound.src) missSound.cloneNode(true).play().catch(e => {});
            }

            setTimeout(() => {
                h.char.classList.remove('hit');
            }, 300);
        }

        function createParticles(parent, color) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.background = color === '#secondary' ? '#4ECDC4' : '#FF6B6B';
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.setProperty('--tx', (Math.random() * 100 - 50) + 'px');
                p.style.setProperty('--ty', (Math.random() * 100 - 50) + 'px');
                parent.appendChild(p);
                setTimeout(() => p.remove(), 500);
            }
        }

        function endGame() {
            gameActive = false;
            bgm.pause();
            bgm.currentTime = 0;
            startScreen.innerHTML = `
                <h1 style="font-size: 3rem; color: var(--accent);">挑戰結束！</h1>
                <p style="font-size: 1.5rem; margin: 20px;">你的得分：<span style="color: var(--secondary); font-size: 3rem;">${score}</span></p>
                <button class="btn" onclick="location.reload()">再玩一次</button>
            `;
            startScreen.style.display = 'flex';
        }
    </script>
</body>
</html>
