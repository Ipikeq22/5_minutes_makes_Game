<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6x6 快速打地鼠 | 程式魔術師</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+TC:wght@700&family=Fira+Code:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --hit-glow: rgba(78, 205, 196, 0.6);
            --miss-glow: rgba(255, 107, 107, 0.6);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Syne', 'Noto Sans TC', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html { width: 100%; height: 100%; overflow: hidden; background: #0d0d14; }

        /* ===== BACKGROUND ===== */
        #game-wrapper {
            width: 100vw; height: 100vh;
            background: url('素材/bg.jpg') center center/cover;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* Dark vignette overlay */
        #game-wrapper::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 100%);
            pointer-events: none; z-index: 0;
        }

        /* ===== GRID ===== */
        #grid-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 8px;
            width: 85vmin;
            height: 85vmin;
            background: rgba(0,0,0,0.35);
            padding: 12px;
            border-radius: 20px;
            border: 1.5px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(6px);
            position: relative; z-index: 1;
            box-shadow: 0 0 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .hole {
            background: rgba(255,255,255,0.04);
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            transition: background 0.2s;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .hole:hover { background: rgba(255,255,255,0.08); }

        /* ===== CHARACTER ===== */
        .character {
            position: absolute;
            inset: 3px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform: scale(0) translateY(20px);
            transition: transform 0.18s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            z-index: 10;
            will-change: transform;
        }

        .character.active {
            transform: scale(1) translateY(0);
        }

        .character.hit {
            transform: scale(1.6) translateY(-5px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.2s ease-out, opacity 0.2s ease-out;
        }

        /* Glow ring on active heroes */
        .character.active.hero::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 8px;
            background: transparent;
            box-shadow: 0 0 14px 3px rgba(78, 205, 196, 0.35);
            animation: heroGlow 1.2s ease-in-out infinite;
        }

        @keyframes heroGlow {
            0%, 100% { box-shadow: 0 0 10px 2px rgba(78, 205, 196, 0.3); }
            50% { box-shadow: 0 0 20px 5px rgba(78, 205, 196, 0.5); }
        }

        /* Villain red glow */
        .character.active.villain::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 8px;
            background: transparent;
            box-shadow: 0 0 14px 3px rgba(255, 107, 107, 0.35);
            animation: villainGlow 0.8s ease-in-out infinite;
        }

        @keyframes villainGlow {
            0%, 100% { box-shadow: 0 0 10px 2px rgba(255, 107, 107, 0.3); }
            50% { box-shadow: 0 0 20px 5px rgba(255, 107, 107, 0.6); }
        }

        /* ===== HUD ===== */
        .hud {
            position: fixed; top: 18px;
            padding: 10px 22px;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            z-index: 100;
            letter-spacing: 0.5px;
        }

        #score-board { left: 18px; }
        #timer-board { right: 18px; }

        #combo-board {
            top: 70px; left: 18px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(78, 205, 196, 0.2);
            border-color: rgba(78, 205, 196, 0.4);
        }

        #combo-board.active { opacity: 1; }

        .hud-val {
            font-family: 'Fira Code', monospace;
            font-variant-numeric: tabular-nums;
            font-weight: 700;
            font-size: 1.25rem;
            vertical-align: middle;
        }

        /* Timer warning pulse */
        #timer-board.danger {
            border-color: rgba(255, 107, 107, 0.6);
            animation: timerPulse 0.5s ease-in-out infinite;
        }

        @keyframes timerPulse {
            0%, 100% { background: rgba(0,0,0,0.45); }
            50% { background: rgba(255, 107, 107, 0.3); }
        }

        /* ===== FLOATING SCORE TEXT ===== */
        .float-score {
            position: fixed;
            font-family: 'Fira Code', monospace;
            font-weight: 700;
            font-size: 1.8rem;
            pointer-events: none;
            z-index: 500;
            animation: floatUp 0.9s ease-out forwards;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            letter-spacing: -1px;
        }

        .float-score.positive { color: #4ECDC4; }
        .float-score.negative { color: #FF6B6B; }

        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            30%  { opacity: 1; transform: translateY(-20px) scale(1.15); }
            100% { opacity: 0; transform: translateY(-70px) scale(0.8); }
        }

        /* ===== OVERLAYS ===== */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.82);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 200; color: white; text-align: center;
            padding: 20px;
        }

        .overlay-title {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 12px;
        }

        .overlay-sub {
            font-size: 1.1rem;
            opacity: 0.7;
            max-width: 380px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .score-display {
            font-family: 'Fira Code', monospace;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            color: var(--secondary);
            letter-spacing: -2px;
            line-height: 1;
            margin: 10px 0 30px;
        }

        .btn {
            padding: 14px 40px;
            background: var(--primary);
            color: white;
            border: none; border-radius: 50px; cursor: pointer;
            font-size: 1.1rem; font-weight: 800;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Syne', sans-serif;
            letter-spacing: -0.5px;
        }

        .btn:hover { transform: scale(1.08) translateY(-3px); box-shadow: 0 15px 35px rgba(255,107,107,0.4); }

        .btn-secondary {
            background: var(--secondary);
            box-shadow: 0 10px 25px rgba(78, 205, 196, 0.3);
        }

        .btn-secondary:hover { box-shadow: 0 15px 35px rgba(78, 205, 196, 0.5); }

        /* ===== DIFFICULTY INDICATOR ===== */
        .difficulty-badge {
            position: fixed;
            bottom: 18px; left: 50%;
            transform: translateX(-50%);
            padding: 6px 18px;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50px;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            z-index: 100;
            letter-spacing: 1px;
            transition: all 0.5s;
        }

        /* ===== PARTICLES ===== */
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            animation: explodeP 0.6s ease-out forwards;
            z-index: 400;
        }

        @keyframes explodeP {
            0%   { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* ===== SCREEN SHAKE ===== */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .shake { animation: shake 0.3s ease-in-out; }

        /* ===== START SCREEN EXTRAS ===== */
        .start-rules {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .rule-pill {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 8px 18px;
            font-size: 0.9rem;
        }

        /* End screen rank */
        .rank-badge {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <!-- HUD -->
        <div id="score-board" class="hud">SCORE <span id="score" class="hud-val">0</span></div>
        <div id="timer-board" class="hud">TIME <span id="timer" class="hud-val">60</span>s</div>
        <div id="combo-board" class="hud">🔥 COMBO <span id="combo" class="hud-val">x1</span></div>
        <div class="difficulty-badge" id="diff-badge">⚡ 準備好了嗎？</div>

        <div id="grid-container"></div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <p style="font-size: 0.85rem; letter-spacing: 3px; opacity: 0.5; margin-bottom: 10px;">PROGRAM MAGICIAN</p>
            <h1 class="overlay-title" style="color: var(--accent);">6×6 打地鼠</h1>
            <p class="overlay-sub">點擊英雄 <strong style="color: var(--secondary)">+10分</strong>，避開反派 <strong style="color: var(--primary)">-20分</strong>，連擊有加乘獎勵！</p>
            <div class="start-rules">
                <span class="rule-pill">⏱ 60 秒</span>
                <span class="rule-pill">🎯 6×6 網格</span>
                <span class="rule-pill">🔥 連擊加成</span>
            </div>
            <button class="btn btn-secondary" onclick="startGame()">開始挑戰！</button>
        </div>
    </div>

    <script>
        // ===== DOM =====
        const grid = document.getElementById('grid-container');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const comboEl = document.getElementById('combo');
        const comboBoard = document.getElementById('combo-board');
        const startScreen = document.getElementById('start-screen');
        const diffBadge = document.getElementById('diff-badge');
        const timerBoard = document.getElementById('timer-board');

        // ===== STATE =====
        let score = 0;
        let timeLeft = 60;
        let gameActive = false;
        let holes = [];
        let combo = 0;
        let comboTimeout;
        let timerInterval;

        // ===== AUDIO =====
        const hitSound  = new Audio('素材/正向音效.mp3');
        const missSound = new Audio('素材/反派音效.mp3');

        // ===== BUILD GRID =====
        for (let i = 0; i < 36; i++) {
            const hole = document.createElement('div');
            hole.className = 'hole';
            const char = document.createElement('div');
            char.className = 'character';
            hole.appendChild(char);
            grid.appendChild(hole);
            holes.push({ hole, char, active: false, isHero: true, points: 0 });

            // Both mouse and touch
            char.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if (char.classList.contains('active')) hitCharacter(i, e);
            });
        }

        // ===== START GAME =====
        function startGame() {
            score = 0; timeLeft = 60; combo = 0; gameActive = true;
            updateScore(); updateCombo();
            timerEl.innerText = timeLeft;
            timerBoard.classList.remove('danger');
            startScreen.style.display = 'none';
            diffBadge.textContent = '⚡ 簡單模式';

            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 10) timerBoard.classList.add('danger');
                updateDifficultyLabel();
                if (timeLeft <= 0) { clearInterval(timerInterval); endGame(); }
            }, 1000);

            gameLoop();
        }

        // ===== GAME LOOP =====
        function gameLoop() {
            if (!gameActive) return;
            const elapsed = 60 - timeLeft;
            // Spawn count grows with time
            const spawnCount = Math.min(2 + Math.floor(elapsed / 15), 6);
            for (let s = 0; s < spawnCount; s++) {
                const index = Math.floor(Math.random() * 36);
                if (!holes[index].active) showCharacter(index, elapsed);
            }
            // Interval shrinks over time
            const delay = Math.max(320, 1100 - elapsed * 13);
            setTimeout(gameLoop, delay);
        }

        // ===== SHOW CHARACTER =====
        function showCharacter(index, elapsed = 0) {
            const h = holes[index];
            h.active = true;
            const isHero = Math.random() > 0.28;   // 72% hero, 28% villain
            h.isHero = isHero;
            h.points = isHero ? 10 : -20;

            h.char.style.backgroundImage = `url('${isHero ? '素材/正.png' : '素材/反.jpg'}')`;
            h.char.classList.remove('hero', 'villain');
            h.char.classList.add(isHero ? 'hero' : 'villain');
            h.char.classList.add('active');

            // Display time shrinks with difficulty
            const displayTime = Math.max(550, 1100 - elapsed * 9);
            h._timer = setTimeout(() => {
                if (h.active) {
                    h.char.classList.remove('active');
                    h.active = false;
                    // Miss the hero → break combo
                    if (isHero) breakCombo();
                }
            }, displayTime);
        }

        // ===== HIT CHARACTER =====
        function hitCharacter(index, event) {
            const h = holes[index];
            if (!h.active) return;

            clearTimeout(h._timer);
            h.active = false;

            // Combo logic
            if (h.isHero) {
                combo++;
                clearTimeout(comboTimeout);
                comboTimeout = setTimeout(breakCombo, 2500);
            } else {
                breakCombo();
            }

            // Calculate points with combo multiplier
            const multiplier = h.isHero ? Math.min(combo, 5) : 1;
            const points = h.points * multiplier;
            score += points;
            updateScore();
            updateCombo();

            h.char.classList.add('hit');
            h.char.classList.remove('active');

            // Screen shake on villain hit
            if (!h.isHero) {
                grid.classList.remove('shake');
                void grid.offsetWidth;
                grid.classList.add('shake');
            }

            // Floating score text
            spawnFloatScore(event.clientX, event.clientY, points, h.isHero);

            // Particles
            const rect = h.hole.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            createParticles(cx, cy, h.isHero);

            // Sound
            if (h.isHero) {
                hitSound.cloneNode(true).play().catch(() => {});
            } else {
                missSound.cloneNode(true).play().catch(() => {});
            }

            setTimeout(() => {
                h.char.classList.remove('hit');
                grid.classList.remove('shake');
            }, 350);
        }

        // ===== FLOATING SCORE =====
        function spawnFloatScore(x, y, points, positive) {
            const el = document.createElement('div');
            el.className = `float-score ${positive ? 'positive' : 'negative'}`;
            const prefix = points > 0 ? '+' : '';
            const comboLabel = (positive && combo > 1) ? ` ×${Math.min(combo, 5)}` : '';
            el.textContent = prefix + points + comboLabel;
            el.style.left = (x - 30) + 'px';
            el.style.top = (y - 20) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 900);
        }

        // ===== PARTICLES =====
        function createParticles(cx, cy, positive) {
            const count = positive ? 10 : 6;
            const colors = positive
                ? ['#4ECDC4', '#45E8E0', '#A8F8F0', '#FFE66D']
                : ['#FF6B6B', '#FF4757', '#FFB3B3'];

            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
                const dist = 40 + Math.random() * 50;
                p.style.cssText = `
                    left: ${cx}px; top: ${cy}px;
                    width: ${5 + Math.random() * 6}px;
                    height: ${5 + Math.random() * 6}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    --tx: ${Math.cos(angle) * dist}px;
                    --ty: ${Math.sin(angle) * dist}px;
                    animation-delay: ${Math.random() * 0.05}s;
                `;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 650);
            }
        }

        // ===== COMBO =====
        function updateCombo() {
            comboEl.innerText = `x${Math.min(combo, 5)}`;
            comboBoard.classList.toggle('active', combo > 1);
        }

        function breakCombo() {
            combo = 0;
            updateCombo();
        }

        function updateScore() {
            scoreEl.innerText = score;
        }

        // ===== DIFFICULTY LABEL =====
        function updateDifficultyLabel() {
            const elapsed = 60 - timeLeft;
            if (elapsed < 15)       diffBadge.textContent = '⚡ 簡單模式';
            else if (elapsed < 30)  diffBadge.textContent = '🔥 普通模式';
            else if (elapsed < 45)  diffBadge.textContent = '💥 困難模式';
            else                    diffBadge.textContent = '☠️ 瘋狂模式！';
        }

        // ===== END GAME =====
        function endGame() {
            gameActive = false;
            // Clear any leftover characters
            holes.forEach(h => {
                clearTimeout(h._timer);
                h.char.classList.remove('active');
                h.active = false;
            });

            const rank = getRank(score);
            startScreen.innerHTML = `
                <p style="font-size:0.85rem;letter-spacing:3px;opacity:0.5;margin-bottom:10px;">GAME OVER</p>
                <div class="rank-badge">${rank.emoji}</div>
                <h1 class="overlay-title" style="color:var(--accent);">${rank.label}</h1>
                <p style="opacity:0.6;margin-bottom:5px;font-size:1rem;">最終得分</p>
                <div class="score-display">${score}</div>
                <p style="opacity:0.5;font-size:0.9rem;margin-bottom:28px;">${rank.msg}</p>
                <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;">
                    <button class="btn btn-secondary" onclick="location.reload()">再玩一次</button>
                    <button class="btn" onclick="shareScore(${score})" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);">分享成績</button>
                </div>
            `;
            startScreen.style.display = 'flex';
        }

        function getRank(s) {
            if (s >= 300) return { emoji: '👑', label: '傳奇大師！', msg: '你根本就是打地鼠之神！' };
            if (s >= 200) return { emoji: '🏆', label: '超級高手！', msg: '反應速度令人驚嘆！' };
            if (s >= 100) return { emoji: '⭐', label: '不錯不錯！', msg: '再練練可以達到更高分！' };
            if (s >= 0)   return { emoji: '😊', label: '繼續加油！', msg: '記得避開反派角色喔！' };
            return { emoji: '😅', label: '下次加油！', msg: '小心點，反派扣的分很多！' };
        }

        function shareScore(s) {
            const text = `我在「6x6打地鼠」得了 ${s} 分！你能超越我嗎？🎮`;
            if (navigator.share) {
                navigator.share({ title: '6x6打地鼠', text });
            } else {
                navigator.clipboard.writeText(text).then(() => alert('成績已複製到剪貼板！'));
            }
        }
    </script>
</body>
</html>
